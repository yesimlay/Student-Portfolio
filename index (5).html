<!DOCTYPE html>
<html>

<title>Lab Work Upload</title>

<style>

body{
font-family:Arial;
background:#224741a8;
margin:0;
}


.navbar{
background:#3e4f50;
padding:15px;
display:flex;
justify-content:center;
gap:20px;
}

.navbar a{
color:rgb(169, 188, 218);
background-color: rgb(41, 39, 122);
border-radius: 10px;
text-decoration: none;
font-weight: bold;
transition: transform 0.3s;
padding: 5px 10px;
}

.navbar a:hover {
transform: scale(1.1);    
}


.container{
background:#668baf;
width:1200px;
max-width:95%;
margin:80px auto;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

h1{
margin-bottom:10px;
color:#101929;
font-size: 50px;
}

h2{
margin-bottom:20px;
color:#101929;
font-size: 30px;
}


.box-wrapper{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap: wrap;
}


.work-box{
background:#314da8;
width:250px;
padding:15px;
border-radius:12px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
transition:0.3s;
}

.work-box:hover{
transform:scale(1.05);
}

.work-box img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}


.work-box a{
display:inline-block;
margin-top:10px;
padding:8px 12px;
background:#29277a;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.work-box a:hover{
background:#1f41a0;
transform: scale(1.05);
}

</style>
</head>
