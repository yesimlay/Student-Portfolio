<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#224741a8;
    margin:0;
}

.navbar{
    background:#3e4f50;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.navbar a{
    color:rgb(169,188,218);
    background:#29277a;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    padding:5px 10px;
}

.navbar a:hover{
    transform:scale(1.1);
}

.container{
    background:#668baf;
    width:1000px;
    max-width:95%;
    margin:80px auto;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:10px;
    color:#101929;
    font-size:50px;
}

h2{
    margin-bottom:20px;
    color:#101929;
    font-size:30px;
}

.box-wrapper{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.work-box{
    background:#314da8;
    width:250px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition:0.3s;
}

.work-box:hover{
    transform:scale(1.05);
}

.work-box img{
    width:100%;
    height:180px;
    object-fit:contain;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="navbar">
    <a href="index.html">Profile</a>
    <a href="index (2).html">About me</a>
    <a href="index (4).html">Quiz</a>
    <a href="index (5).html">Lab Work</a>
    <a href="index (6).html">Major Exam</a>
</div>

<div class="container">

    <h1>Quiz</h1>
    <h2>Total of Quiz: 3</h2>

    <div class="box-wrapper">

        <div class="work-box">
            <img src="quiz1.jpg" alt="Quiz 1">
            <h3>Quiz 1</h3>
            <p>Score - <span style="color:red;font-size:20px;">15/20</span></p>
        </div>

        <div class="work-box">
            <img src="quiz2.jpg" alt="Quiz 2">
            <h3>Quiz 2</h3>
            <p>Score - <span style="color:red;font-size:20px;">13/20</span></p>
        </div>

        <div class="work-box">
            <img src="quiz3.jpg" alt="Quiz 3">
            <h3>Quiz 3</h3>
            <p>Score - <span style="color:red;font-size:20px;">4/20</span></p>
        </div>

    </div>

</div>

</body>
</html>
