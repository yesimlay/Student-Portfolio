<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.container{
    width:700px;
    background:#d9d9d9;
    padding:50px;
    text-align:center;
    border:2px solid #555;
}

h1{
    margin-bottom:30px;
}

input{
    width:180px;
    padding:10px;
    margin:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.result{
    margin-top:20px;
    font-size:30px;
    font-weight:bold;
}

.dark-btn{
    position:absolute;
    top:20px;
    right:20px;
    background:#222;
}

.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .container{
    background:#333;
    color:white;
}
#alertBtn{
    position:absolute;
    top:20px;
    left:20px;
    background:#28a745;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}
    .back-btn{
    display:inline-block;
    background:#2946b8;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:16px;
    margin-bottom:20px;
    transition:0.3s;
}

.back-btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>
    <div style="text-align:center; margin-top:40px;">
    <a href="index (5).html" class="back-btn">Go to Lab Work</a>
    </div>
<button id="alertBtn" onclick="toggleAlert()">
    🔔 Alert ON
</button>
<button class="dark-btn" onclick="toggleDarkMode()">
🌙 Dark Mode
</button>
<div class="container">
    <h1>Simple Calculator</h1>

    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">

    <br><br>

    <button onclick="add()">Add (+)</button>
    <button onclick="subtract()">Subtract (-)</button>
    <button onclick="multiply()">Multiply (×)</button>
    <button onclick="divide()">Divide (÷)</button>
    <button onclick="clearData()">Clear (C)</button>

    <div class="result">
        Result: <span id="result">0</span>
    </div>
</div>

<script>

function getValues(){
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);

    if(isNaN(num1)) num1 = 0;
    if(isNaN(num2)) num2 = 0;

    return {num1, num2};
}

function add(){
    let {num1, num2} = getValues();
    document.getElementById("result").innerText = num1 + num2;
}

function subtract(){
    let {num1, num2} = getValues();
    document.getElementById("result").innerText = num1 - num2;
}

function multiply(){
    let {num1, num2} = getValues();
    document.getElementById("result").innerText = num1 * num2;
}

function divide(){
    let {num1, num2} = getValues();

    if(num2 === 0){
        document.getElementById("result").innerText =
        "Cannot divide by zero";
        return;
    }

    document.getElementById("result").innerText = num1 / num2;
}

function clearData(){
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result").innerText = "0";
}

function toggleDarkMode(){
    document.body.classList.toggle("dark-mode");
}
let alertEnabled = true;

function toggleAlert(){

    if(alertEnabled){
        alertEnabled = false;
        document.getElementById("alertBtn").innerHTML =
        "🔕 Alert OFF";
        document.getElementById("alertBtn").style.background =
        "#dc3545";
    }
    else{
        alertEnabled = true;
        document.getElementById("alertBtn").innerHTML =
        "🔔 Alert ON";
        document.getElementById("alertBtn").style.background =
        "#28a745";
    }
}
</script>

</body>
</html>
